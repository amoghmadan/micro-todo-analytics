syntax = "proto3";

package task.protobuf.v1;

import "google/protobuf/timestamp.proto";

enum Status {
  STATUS_TODO_UNSPECIFIED = 0;
  STATUS_IN_PROGRESS = 1;
  STATUS_DONE = 2;
  STATUS_SCRAPED = 3;
}

message CreateItemRequest {
  string description = 1;
  Status status = 2;
}
message CreateItemResponse {
  string id = 1;
  string description = 2;
  Status status = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message RetrieveItemRequest {
  string id = 1;
}
message RetrieveItemResponse {
  string id = 1;
  string description = 2;
  Status status = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message ListItemRequest {
  int64 limit = 1;
  int64 offset = 2;
  string ordering = 3;
  Status status = 4;
}
message ListItemResponse {
  int64 count = 1;
  repeated RetrieveItemResponse results = 2;
}

message UpdateItemRequest {
  string id = 1;
  string description = 2;
  Status status = 3;
}
message UpdateItemResponse {
  string id = 1;
  string description = 2;
  Status status = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message DestroyItemRequest {
  string id = 1;
}
message DestroyItemResponse {}

service ItemService {
  rpc CreateItem(CreateItemRequest) returns (CreateItemResponse);
  rpc ListItem(ListItemRequest) returns (ListItemResponse);
  rpc RetrieveItem(RetrieveItemRequest) returns (RetrieveItemResponse);
  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse);
  rpc DestroyItem(DestroyItemRequest) returns (DestroyItemResponse);
}
